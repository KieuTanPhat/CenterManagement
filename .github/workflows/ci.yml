name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore CenterManagement.Tests/CenterManagement.Tests.csproj

      - name: Build
        run: dotnet build CenterManagement.Tests/CenterManagement.Tests.csproj --no-restore --configuration Release

      - name: Run Unit Tests with Coverage
        run: |
          dotnet test CenterManagement.Tests/CenterManagement.Tests.csproj \
                      --no-build --configuration Release \
                      --verbosity normal \
                      --collect:"XPlat Code Coverage" \
                      --results-directory ./coverage

      - name: Generate Coverage Report
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:"./coverage/**/coverage.cobertura.xml" \
            -targetdir:"./coverage/report" \
            -reporttypes:Html

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/*.xml'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./coverage/report/